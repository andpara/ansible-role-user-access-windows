- name: ensure existence of user
  win_user:
    name: '{{ user_access_username }}'

- name: ensure existence of user's profile
  win_user_profile:
    name: '{{ user_access_username }}'
    username: '{{ user_access_username }}'
  register: user_access_profile

- name: ensure existence of SSH directory
  win_file:
    path: '{{ user_access_profile.path }}\.ssh'
    state: directory

- name: add public key to authorized keys
  win_copy:
    dest: '{{ user_access_profile.path }}\.ssh\authorized_keys'
    content: '{{ lookup("file", user_access_ssh_public_key) }}'

- name: set password if defined
  win_user:
    name: '{{ user_access_username }}'
    password: '{{ user_access_password }}'
  when: user_access_password is defined and user_access_password

- name: add user to administrators group
  win_user:
    name: '{{ user_access_username }}'
    groups:
      - Administrators
    groups_action: add
  when: user_access_admin

- name: enable RDP
  win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: 0
    type: dword
  when: user_access_rdp

- name: enable RDP through firewall
  win_firewall_rule:
    name: Remote Desktop
    localport: 3389
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: yes
  when: user_access_rdp

- name: Enable Password Authentication in sshd_config
  win_lineinfile:
    path: 'C:\ProgramData\ssh\sshd_config'
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
  when: user_access_password is defined and user_access_password
  notify: restart win sshd

- name: Keep TLS but Disable NLA (Fix TLS connection failure caused by untrusted certificate)
  win_regedit:
    path: '{{ item.path }}'
    name: '{{ item.name }}'
    data: '{{ item.data }}'
    type: dword
  loop:
    - { path: 'HKLM:\System\CurrentControlSet\Control\Terminal Server', name: 'fDenyTSConnections', data: 0 }
    - { path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp', name: 'UserAuthentication', data: 0 }
    - { path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp', name: 'SecurityLayer', data: 0 }
  when: user_access_rdp
  notify: restart win rdp

